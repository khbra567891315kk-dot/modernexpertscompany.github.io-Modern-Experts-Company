<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>الصفحة غير موجودة - شركة خبراء العصر</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=6" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js" defer></script>
  <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.js" defer></script>
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      color: var(--primary);
      margin: 0;
      line-height: 1;
    }
    .error-title {
      font-size: 2rem;
      margin: 1rem 0;
      color: var(--text);
    }
    .error-desc {
      color: var(--muted);
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <!-- ترويسة -->
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <span class="logo-wrap">
          <img class="logo-float" src="logo.png" alt="شعار شركة خبراء العصر" width="48" height="48" loading="eager" />
        </span>
        <span>شركة خبراء العصر</span>
      </a>
    </div>
  </header>

  <main class="error-page container">
    <h1 class="error-code">404</h1>
    <h2 class="error-title">عذراً، الصفحة غير موجودة</h2>
    <p class="error-desc">يبدو أن الصفحة التي تبحث عنها قد تم نقلها أو حذفها، أو أن الرابط غير صحيح.</p>
    <a href="index.html" class="btn btn-primary">
      <i class="fa-solid fa-home"></i> العودة للرئيسية
    </a>
  </main>
</body>
</html>
