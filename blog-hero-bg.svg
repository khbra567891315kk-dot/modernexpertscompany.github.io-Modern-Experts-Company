<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="2" fill="white" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- الخلفية الأساسية -->
  <rect width="1200" height="600" fill="url(#grad1)"/>
  
  <!-- نمط النقاط -->
  <rect width="1200" height="600" fill="url(#dots)"/>
  
  <!-- أشكال هندسية -->
  <circle cx="100" cy="100" r="60" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="500" r="80" fill="white" opacity="0.03"/>
  <rect x="900" y="50" width="40" height="40" rx="8" fill="white" opacity="0.08" transform="rotate(45 920 70)"/>
  
  <!-- أيقونات المحاسبة -->
  <!-- آلة حاسبة -->
  <g transform="translate(150, 400)" opacity="0.1">
    <rect x="0" y="0" width="60" height="80" rx="8" fill="white"/>
    <rect x="8" y="8" width="44" height="16" rx="4" fill="currentColor"/>
    <circle cx="16" cy="36" r="4" fill="currentColor"/>
    <circle cx="30" cy="36" r="4" fill="currentColor"/>
    <circle cx="44" cy="36" r="4" fill="currentColor"/>
    <circle cx="16" cy="50" r="4" fill="currentColor"/>
    <circle cx="30" cy="50" r="4" fill="currentColor"/>
    <circle cx="44" cy="50" r="4" fill="currentColor"/>
    <rect x="16" y="60" width="28" height="8" rx="4" fill="currentColor"/>
  </g>
  
  <!-- مخطط بياني -->
  <g transform="translate(950, 150)" opacity="0.08">
    <rect x="0" y="40" width="8" height="20" fill="white"/>
    <rect x="12" y="30" width="8" height="30" fill="white"/>
    <rect x="24" y="20" width="8" height="40" fill="white"/>
    <rect x="36" y="10" width="8" height="50" fill="white"/>
    <rect x="48" y="25" width="8" height="35" fill="white"/>
  </g>
  
  <!-- عملات -->
  <g transform="translate(200, 150)" opacity="0.06">
    <circle cx="0" cy="0" r="20" fill="white"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="currentColor">﷼</text>
  </g>
  
  <!-- ملف مستندات -->
  <g transform="translate(1000, 350)" opacity="0.07">
    <rect x="0" y="0" width="30" height="40" rx="4" fill="white"/>
    <rect x="4" y="8" width="22" height="2" fill="currentColor"/>
    <rect x="4" y="14" width="18" height="2" fill="currentColor"/>
    <rect x="4" y="20" width="20" height="2" fill="currentColor"/>
    <rect x="4" y="26" width="16" height="2" fill="currentColor"/>
  </g>
  
  <!-- خطوط زخرفية -->
  <path d="M0,300 Q300,250 600,300 T1200,300" stroke="white" stroke-width="2" fill="none" opacity="0.1"/>
  <path d="M0,350 Q400,300 800,350 T1200,350" stroke="white" stroke-width="1" fill="none" opacity="0.08"/>
</svg>